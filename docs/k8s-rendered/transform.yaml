---
# Source: transform/templates/networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: transform
  labels:
    app.kubernetes.io/name: transform
    app.kubernetes.io/instance: transform
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: nhs-interop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: transform
      app.kubernetes.io/instance: transform
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: interop
      ports:
        - port: 8001
          protocol: TCP
  egress:
    # Allow CoreDNS lookups.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to explicitly named downstream services.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pds-client
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: hapi-fhir
---
# Source: transform/templates/pdb.yaml
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: transform
  labels:
    app.kubernetes.io/name: transform
    app.kubernetes.io/instance: transform
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: nhs-interop
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: transform
      app.kubernetes.io/instance: transform
---
# Source: transform/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: transform
  labels:
    app.kubernetes.io/name: transform
    app.kubernetes.io/instance: transform
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: nhs-interop
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<account-id>:role/nhs-interop-dev-interop-sa
automountServiceAccountToken: true
---
# Source: transform/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: transform
  labels:
    app.kubernetes.io/name: transform
    app.kubernetes.io/instance: transform
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: nhs-interop
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: transform
    app.kubernetes.io/instance: transform
---
# Source: transform/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transform
  labels:
    app.kubernetes.io/name: transform
    app.kubernetes.io/instance: transform
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: nhs-interop
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: transform
      app.kubernetes.io/instance: transform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transform
        app.kubernetes.io/instance: transform
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8001"
        prometheus.io/scrape: "true"
    spec:
      serviceAccountName: transform
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        # Spread replicas across AZs for multi-AZ survivability.
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: transform
              app.kubernetes.io/instance: transform
      containers:
        - name: transform
          image: "ghcr.io/<you>/nhs-interop/transform:0.1.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: DLQ_PATH
              value: "/tmp/dlq"
            - name: FHIR_BASE_URL
              value: "http://hapi-fhir:8080/fhir"
            - name: LOG_LEVEL
              value: "INFO"
            - name: PDS_CLIENT_URL
              value: "http://pds-client:8002/pds"
            - name: PDS_ENABLED
              value: "true"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              cpu: 1
              memory: 512Mi
            requests:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
# Source: transform/templates/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: transform
  labels:
    app.kubernetes.io/name: transform
    app.kubernetes.io/instance: transform
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: nhs-interop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: transform
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
