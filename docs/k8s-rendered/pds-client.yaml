# Source: pds-client/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: pds-client
  labels:
    app.kubernetes.io/name: pds-client
    app.kubernetes.io/instance: pds-client
    app.kubernetes.io/version: "0.1.0"
