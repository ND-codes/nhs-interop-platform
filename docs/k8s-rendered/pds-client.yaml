---
# Source: pds-client/templates/networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pds-client
  labels:
    app.kubernetes.io/name: pds-client
    app.kubernetes.io/instance: pds-client
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: nhs-interop
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pds-client
      app.kubernetes.io/instance: pds-client
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: interop
      ports:
        - port: 8002
          protocol: TCP
  egress:
    # Allow CoreDNS lookups.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to explicitly named downstream services.
---
