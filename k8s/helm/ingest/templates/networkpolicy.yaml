{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ingest.fullname" . }}
  labels: {{- include "ingest.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "ingest.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
      {{- range .Values.networkPolicy.ingressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      {{- end }}
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
  egress:
    # Allow CoreDNS lookups.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow egress to explicitly named downstream services.
    {{- range .Values.networkPolicy.egressServices }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ . }}
    {{- end }}
{{- end }}
