replicaCount: 2

image:
  repository: ghcr.io/<you>/nhs-interop/pds-client
  tag: 0.1.0
  pullPolicy: IfNotPresent

service:
  port: 8002

serviceAccount:
  create: true
  name: pds-client
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::<account-id>:role/nhs-interop-dev-interop-sa"

env:
  PDS_STUB: "false"
  PDS_BASE_URL: "https://sandbox.api.service.nhs.uk/personal-demographics/FHIR/R4"
  LOG_LEVEL: "INFO"

# PDS_API_KEY comes from Secrets Manager via the CSI driver — wire this up
# with External Secrets Operator in prod.
# envFromSecret: pds-api-key

resources:
  requests: { cpu: 50m,  memory: 64Mi }
  limits:   { cpu: 200m, memory: 128Mi }

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 60

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingressNamespaces: ["interop"]
  egressServices: []   # egress to external PDS goes via VPC NAT; controlled by SG

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

probes:
  liveness:
    httpGet: { path: /healthz, port: 8002 }
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    httpGet: { path: /readyz, port: 8002 }
    initialDelaySeconds: 5
    periodSeconds: 5

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8002"
  prometheus.io/path: "/metrics"
