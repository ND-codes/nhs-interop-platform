apiVersion: v1
kind: Service
metadata:
  name: {{ include "pds-client.fullname" . }}
  labels: {{- include "pds-client.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector: {{- include "pds-client.selectorLabels" . | nindent 4 }}
