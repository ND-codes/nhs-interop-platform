apiVersion: v1
kind: Service
metadata:
  name: {{ include "transform.fullname" . }}
  labels: {{- include "transform.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector: {{- include "transform.selectorLabels" . | nindent 4 }}
