apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: transform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<you>/nhs-interop-platform
    targetRevision: HEAD
    path: k8s/helm/transform
    helm:
      releaseName: transform
  destination:
    server: https://kubernetes.default.svc
    namespace: interop
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
