# GitLab CI — the pipeline we want every change to walk through before it
# lands on main. Stages match our quality gates: lint → test → security →
# build/sign/push → deploy. Each service has its own job, so failures are
# scoped and parallelised.

stages:
  - lint
  - test
  - security
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.12-slim"
  REGISTRY: "$CI_REGISTRY_IMAGE"
  DOCKER_BUILDKIT: "1"
  TRIVY_SEVERITY: "HIGH,CRITICAL"
  TRIVY_EXIT_CODE: "1"

default:
  tags: [docker]
  interruptible: true
  image: python:${PYTHON_VERSION}
  before_script:
    - python -V

# ---- Reusable template matrix over the three services -----------------------
.python_service_matrix: &python_service_matrix
  parallel:
    matrix:
      - SERVICE: [ingest, transform, pds-client]

# ---- lint -------------------------------------------------------------------
lint:
  stage: lint
  <<: *python_service_matrix
  script:
    - cd services/$SERVICE
    - pip install --quiet ruff==0.6.9
    - ruff check .

# ---- test -------------------------------------------------------------------
test:
  stage: test
  <<: *python_service_matrix
  script:
    - cd services/$SERVICE
    - pip install --quiet -r requirements-dev.txt
    - pytest -q --junitxml=junit.xml --cov=. --cov-report=xml
  artifacts:
    when: always
    reports:
      junit: services/$SERVICE/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: services/$SERVICE/coverage.xml

# ---- security ---------------------------------------------------------------
# SAST — Semgrep
semgrep:
  stage: security
  image:
    name: returntocorp/semgrep:latest
    entrypoint: [""]
  script:
    - semgrep --config p/ci --config p/python --config p/security-audit --error

# Secret scanning — Gitleaks
gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --redact --no-git -v --exit-code 1

# Container vulnerability scan — Trivy (runs after build)
trivy:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs: ["build"]
  <<: *python_service_matrix
  script:
    - trivy image --severity $TRIVY_SEVERITY --exit-code $TRIVY_EXIT_CODE $REGISTRY/$SERVICE:$CI_COMMIT_SHORT_SHA

# SBOM — Syft, SPDX format. Published as a pipeline artefact for evidence.
sbom:
  stage: security
  image:
    name: anchore/syft:latest
    entrypoint: [""]
  needs: ["build"]
  <<: *python_service_matrix
  script:
    - syft $REGISTRY/$SERVICE:$CI_COMMIT_SHORT_SHA -o spdx-json > $SERVICE.sbom.json
  artifacts:
    paths:
      - "*.sbom.json"
    expire_in: 90 days

# ---- build ------------------------------------------------------------------
build:
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  <<: *python_service_matrix
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t $REGISTRY/$SERVICE:$CI_COMMIT_SHORT_SHA services/$SERVICE
    - docker push $REGISTRY/$SERVICE:$CI_COMMIT_SHORT_SHA
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        docker tag  $REGISTRY/$SERVICE:$CI_COMMIT_SHORT_SHA $REGISTRY/$SERVICE:latest
        docker push $REGISTRY/$SERVICE:latest
      fi

# ---- deploy -----------------------------------------------------------------
# ArgoCD is the source of deployment truth; the CI job simply bumps the image
# tag in the Helm chart and commits — ArgoCD picks it up and syncs.
deploy:
  stage: deploy
  image: alpine:3.20
  needs: ["build", "trivy", "sbom"]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache git yq
  script:
    - git config user.email "ci@nhs-interop.example"
    - git config user.name  "CI"
    - |
      for svc in ingest transform pds-client; do
        yq -i ".image.tag = \"$CI_COMMIT_SHORT_SHA\"" k8s/helm/$svc/values.yaml
      done
    - git add k8s/helm/*/values.yaml
    - git commit -m "chore(deploy): $CI_COMMIT_SHORT_SHA [skip ci]"
    - git push origin HEAD:main
