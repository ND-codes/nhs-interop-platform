global:
  scrape_interval: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: ingest
    static_configs:
      - targets: ['ingest:8000']
        labels:
          service: ingest
  - job_name: transform
    static_configs:
      - targets: ['transform:8001']
        labels:
          service: transform
  - job_name: pds-client
    static_configs:
      - targets: ['pds-client:8002']
        labels:
          service: pds-client
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
